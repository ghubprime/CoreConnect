name: CI Matrix Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, sqlserver, postgresql]

    runs-on: ubuntu-latest

    services:
      # Docker is available by default on ubuntu-latest for Testcontainers.
      docker:
        image: docker

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DB_PROVIDER: ${{ matrix.db }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test Tests/Server.Tests --no-build --configuration Release --verbosity normal

    - name: Run Integration Tests
      run: |
        dotnet test Tests/IntegrationTests --no-build --configuration Release \
          --verbosity normal \
          --filter "FullyQualifiedName~${{ matrix.db == 'sqlserver' && 'SqlServer' || matrix.db == 'postgresql' && 'Pg' || 'Sqlite' }}"
