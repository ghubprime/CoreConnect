name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "9.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build, Test & Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore Server
        run: dotnet restore Server/Server.csproj

      - name: Build Server
        run: dotnet build Server/Server.csproj --no-restore --configuration Release

      - name: Restore and run tests
        run: |
          dotnet restore Tests/Server.Tests/Server.Tests.csproj
          dotnet test Tests/Server.Tests/Server.Tests.csproj --configuration Release --verbosity normal

      - name: Publish Server (linux-x64)
        run: |
          VERSION=$(date -u +"%Y.%m.%d.%H%M")
          echo "Publishing CoreConnect Server v${VERSION} for linux-x64"
          dotnet publish \
            /p:Version=$VERSION \
            /p:FileVersion=$VERSION \
            --runtime linux-x64 \
            --self-contained \
            --configuration Release \
            --output ./Server/bin/publish \
            ./Server/Server.csproj

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Server/Dockerfile
          push: false
          load: true
          tags: coreconnect:ci-${{ github.sha }}

      - name: Smoke test Docker image
        run: |
          echo "Starting CoreConnect container for smoke test..."
          mkdir -p /tmp/coreconnect-appdata
          docker run -d \
            --name coreconnect-ci \
            -v /tmp/coreconnect-appdata:/app/AppData \
            -e ASPNETCORE_ENVIRONMENT=Production \
            -e ASPNETCORE_HTTP_PORTS=5000 \
            -e CoreConnect_ApplicationOptions__DbProvider=SQLite \
            -e "CoreConnect_ConnectionStrings__SQLite=Data Source=/app/AppData/CoreConnect.db" \
            -p 5000:5000 \
            coreconnect:ci-${{ github.sha }}

          echo "Waiting for container to start..."
          sleep 10

          echo "Checking container status..."
          docker ps -a --filter "name=coreconnect-ci"
          docker logs coreconnect-ci

          echo "Running health check..."
          RETRY=0
          MAX_RETRIES=6
          until docker exec coreconnect-ci curl -sf http://localhost:5000/api/healthcheck > /dev/null 2>&1; do
            RETRY=$((RETRY+1))
            if [ $RETRY -ge $MAX_RETRIES ]; then
              echo "Health check failed after ${MAX_RETRIES} retries"
              docker logs coreconnect-ci
              exit 1
            fi
            echo "Retry ${RETRY}/${MAX_RETRIES} - waiting 5s..."
            sleep 5
          done

          echo "✅ Health check passed!"
          docker stop coreconnect-ci
          docker rm coreconnect-ci
